<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Men's Wear</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/luxury-global.css">
</head>

<body>

    <!-- Header dùng chung -->
    <div id="header"></div>

    <!-- Nội dung riêng của từng trang -->
    <main>
        <section class="auth-page">
            <div class="container">
                <h1>Login</h1>

                <form id="loginForm">
                    <input type="email" id="loginEmail" class="form-control mb-3" placeholder="Email">
                    <input type="password" id="loginPassword" class="form-control mb-3" placeholder="Password">

                    <button type="submit" class="btn btn-dark">Login</button>

                    <p class="mt-3">
                        Don't have an account?
                        <a href="register.html">Register</a>
                    </p>
                </form>
            </div>
        </section>
    </main>

    <!-- Footer dùng chung -->
    <div id="footer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Common JS -->
    <script src="js/components.js"></script>
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/form.js"></script>

    <!-- Page JS đặt ở dưới tùy từng trang -->
</body>

</html>
