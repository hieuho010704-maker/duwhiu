<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail - Men's Wear</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/luxury-global.css">
</head>

<body>

    <div id="header"></div>

    <main>
        <section class="product-detail-section">
            <div class="container-58">
                <div class="product-detail-wrapper">

                    <!-- Khu vực hiển thị sản phẩm chi tiết -->
                    <div id="productDetailContent">
                        <!-- Loading spinner (hiển thị khi chưa load xong) -->
                        <div class="text-center py-5">
                            <div class="spinner-border text-dark" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                            <p class="mt-3 text-muted">Loading product details...</p>
                        </div>
                    </div>

                </div>
            </div>
        </section>
    </main>


    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

   

    <script src="js/components.js"></script>
    <script type="module" src="js/main.js"></script>

    <script type="module" src="js/product-detail.js"></script>
</body>

</html>
