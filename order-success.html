<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success - Men's Wear</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/luxury-global.css">
</head>

<body>

    <!-- Header dùng chung -->
    <div id="header"></div>

    <!-- Nội dung riêng của từng trang -->
    <main>
        <section class="order-success-section">
            <div class="container-58">
                <div class="order-success-wrapper">

                    <!-- Icon thành công -->
                    <div class="success-icon">
                        <i class="fa-solid fa-circle-check"></i>
                    </div>

                    <h1 class="success-title">Order Placed Successfully!</h1>
                    <p class="success-subtitle">Thank you for shopping with Men's Wear.</p>

                    <!-- Mã đơn hàng -->
                    <div class="order-id-box">
                        <span>Order ID:</span>
                        <strong id="orderIdDisplay">#000000</strong>
                    </div>

                    <!-- Chi tiết đơn hàng -->
                    <div class="order-details-box">

                        <h3>Order Details</h3>

                        <!-- Thông tin khách hàng -->
                        <div class="detail-section">
                            <h4>Customer Information</h4>
                            <p><strong>Name:</strong> <span id="customerName">-</span></p>
                            <p><strong>Email:</strong> <span id="customerEmail">-</span></p>
                            <p><strong>Phone:</strong> <span id="customerPhone">-</span></p>
                            <p><strong>Address:</strong> <span id="customerAddress">-</span></p>
                            <p><strong>Payment Method:</strong> <span id="paymentMethod">-</span></p>
                        </div>

                        <!-- Danh sách sản phẩm -->
                        <div class="detail-section">
                            <h4>Items</h4>
                            <div id="orderItemsList" class="order-items-list">
                                <!-- Sẽ render bằng JS -->
                            </div>
                        </div>

                        <!-- Tổng tiền -->
                        <div class="detail-section total-section">
                            <div class="total-row">
                                <span>Subtotal:</span>
                                <span id="subtotalDisplay">0 VND</span>
                            </div>
                            <div class="total-row">
                                <span>Shipping:</span>
                                <span id="shippingDisplay">Free</span>
                            </div>
                            <div class="total-row grand-total">
                                <span>Total:</span>
                                <span id="grandTotalDisplay">0 VND</span>
                            </div>
                        </div>

                    </div>

                    <!-- Nút hành động -->
                    <div class="success-actions">
                        <a href="index.html" class="btn btn-outline-dark">
                            <i class="fa-solid fa-house"></i> Back to Home
                        </a>
                        <a href="products.html" class="btn btn-dark">
                            <i class="fa-solid fa-cart-shopping"></i> Continue Shopping
                        </a>
                    </div>

                </div>
            </div>
        </section>
    </main>

    <!-- Footer dùng chung -->
    <div id="footer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Common JS -->
    <script src="js/components.js"></script>
    <script type="module" src="js/main.js"></script>
    <script src="js/order-success.js"></script>

    <!-- Page JS đặt ở dưới tùy từng trang -->
</body>

</html>
