<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Men's Wear</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

    <!-- Header dùng chung -->
    <div id="header"></div>

    <!-- Nội dung riêng của từng trang -->
    <main>
        <section class="payment-page">
            <div class="container">
                <h1>Payment</h1>

                <div class="row">
                    <div class="col-lg-7">
                        <form id="paymentForm">
                            <input type="text" id="fullName" class="form-control mb-3" placeholder="Full name">
                            <input type="text" id="phone" class="form-control mb-3" placeholder="Phone number">
                            <input type="text" id="address" class="form-control mb-3" placeholder="Address">

                            <select id="paymentMethod" class="form-control mb-3">
                                <option value="">Choose payment method</option>
                                <option value="cod">Cash on Delivery</option>
                                <option value="bank">Bank Transfer</option>
                            </select>

                            <button type="submit" class="btn btn-dark">Place Order</button>
                        </form>
                    </div>

                    <div class="col-lg-5">
                        <div id="orderSummary"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer dùng chung -->
    <div id="footer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Common JS -->
    <script src="js/products-data.js"></script>

    <script src="js/components.js"></script>
    <script src="js/main.js"></script>

    <script src="js/payment.js"></script>
    <script src="js/form.js"></script>

    <!-- Page JS đặt ở dưới tùy từng trang -->
</body>

</html>
