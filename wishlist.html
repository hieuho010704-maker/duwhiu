<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist - Men's Wear</title>
    <meta name="description" content="Manage your saved items and favorites.">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/luxury-global.css">
</head>

<body>

    <!-- Dynamic Header -->
    <div id="header"></div>

    <main>
        <section class="wishlist-section luxury-section">
            <div class="container">
                <div class="page-header-luxury text-center">
                    <span class="section-label">Your Favorites</span>
                    <h1>My Wishlist</h1>
                    <p class="section-subtitle">Keep track of the luxury pieces you love.</p>
                </div>

                <!-- Empty State -->
                <div id="wishlistEmpty" class="text-center py-5" style="display: none;">
                    <div class="mb-4" style="font-size: 64px; color: var(--gray-mid, #BDBDBD);">
                        <i class="fa-regular fa-heart"></i>
                    </div>
                    <h3 class="mb-3" style="font-family: var(--font-heading); font-size: 28px;">Your wishlist is currently empty.</h3>
                    <p class="text-muted mb-4">Explore our collections and tap the heart icon to save products here.</p>
                    <a href="products.html" class="btn-luxury">Explore Collection</a>
                </div>

                <!-- Wishlist Grid -->
                <div id="wishlistGrid" class="row" style="display: none;">
                    <!-- Products will be rendered here by JS -->
                </div>
            </div>
        </section>
    </main>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/components.js"></script>
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/wishlist.js"></script>
</body>

</html>
