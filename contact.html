<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Men's Wear</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

    <!-- Header dùng chung -->
    <div id="header"></div>

    <!-- Nội dung riêng của từng trang -->
    <main>
        <section class="contact-page">
            <div class="container">
                <h1>Contact Us</h1>

                <div class="row">
                    <div class="col-lg-5">
                        <h3>Store Information</h3>
                        <p><i class="fa-solid fa-location-dot"></i> Da Nang, Vietnam</p>
                        <p><i class="fa-solid fa-phone"></i> 0123 456 789</p>
                        <p><i class="fa-solid fa-envelope"></i> support@menswear.com</p>
                    </div>

                    <div class="col-lg-7">
                        <form id="contactForm">
                            <input type="text" id="contactName" class="form-control mb-3" placeholder="Your name">
                            <input type="email" id="contactEmail" class="form-control mb-3" placeholder="Your email">
                            <textarea id="contactMessage" class="form-control mb-3" rows="5"
                                placeholder="Your message"></textarea>

                            <button type="submit" class="btn btn-dark">Send Message</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer dùng chung -->
    <div id="footer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Common JS -->

    <script src="js/components.js"></script>
    <script src="js/main.js"></script>
    <script src="js/form.js"></script>

    <!-- Page JS đặt ở dưới tùy từng trang -->
</body>

</html>
