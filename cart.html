<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Men's Wear</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/luxury-global.css">
</head>

<body>

    <!-- Header dùng chung -->
    <div id="header"></div>

    <!-- Nội dung riêng của từng trang -->
    <main>
        <section class="luxury-cart-page">
            <div class="container">
                <nav class="detail-breadcrumb">
                    <a href="index.html">Home</a>
                    <span class="separator">/</span>
                    <span class="current">Shopping Bag</span>
                </nav>

                <h1 class="page-title text-center mb-5" style="font-size: var(--text-4xl); font-family: 'Playfair Display', serif;">Shopping Bag</h1>

                <div class="row cart-layout">
                    <!-- Left: Cart Items -->
                    <div class="col-lg-8 cart-items-col">
                        <div class="cart-table-header d-none d-md-grid">
                            <div class="th-product">Product</div>
                            <div class="th-qty">Quantity</div>
                            <div class="th-total">Total</div>
                            <div class="th-action"></div>
                        </div>
                        <div id="cartItems" class="cart-items-container">
                            <!-- Items go here -->
                        </div>
                        <div class="cart-continue mt-4">
                            <a href="products.html" class="cart-continue-link" style="color: var(--black); text-decoration: underline;"><i class="fa-solid fa-arrow-left"></i> Continue Shopping</a>
                        </div>
                    </div>

                    <!-- Right: Summary -->
                    <div class="col-lg-4 cart-summary-col">
                        <div class="order-summary-box" id="cartSummary" style="display: none;">
                            <h2 style="font-family: 'Playfair Display', serif; margin-bottom: 24px; font-size: var(--text-xl);">Order Summary</h2>
                            <div class="summary-line">
                                <span>Subtotal</span>
                                <span id="cartSubtotal">0 VND</span>
                            </div>
                            <div class="summary-line">
                                <span>Shipping</span>
                                <span id="cartShipping">Calculated at next step</span>
                            </div>
                            <hr class="summary-divider">
                            <div class="summary-line total-line">
                                <span>Total</span>
                                <span id="cartTotal">0 VND</span>
                            </div>

                            <div class="promo-code-box mt-4">
                                <label for="promoCode" style="font-size: var(--text-sm); display:block; margin-bottom: 8px;">Promo Code</label>
                                <div class="d-flex" style="gap: 10px;">
                                    <input type="text" id="promoCode" class="form-control" placeholder="Enter code">
                                    <button class="btn btn-dark" id="applyPromoBtn" style="border-radius: 0;">Apply</button>
                                </div>
                            </div>

                            <a href="payment.html" class="btn-luxury w-100 mt-4 text-center d-block">Proceed to Checkout</a>
                            
                            <div class="secure-checkout text-center mt-4" style="color: var(--gray-600); font-size: var(--text-sm);">
                                <i class="fa-solid fa-lock"></i> Secure Checkout
                                <div class="mt-2" style="font-size: 24px; color: var(--gray-400);">
                                    <i class="fa-brands fa-cc-visa me-2"></i>
                                    <i class="fa-brands fa-cc-mastercard me-2"></i>
                                    <i class="fa-brands fa-cc-paypal"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer dùng chung -->
    <div id="footer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Common JS -->
    <script src="js/components.js"></script>
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/cart-page.js"></script>

    <!-- Page JS đặt ở dưới tùy từng trang -->
</body>

</html>
