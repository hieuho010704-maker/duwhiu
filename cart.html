<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Men's Wear</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/luxury-global.css">
</head>

<body>

    <!-- Header dùng chung -->
    <div id="header"></div>

    <!-- Nội dung riêng của từng trang -->
    <main>
        <section class="cart-page">
            <div class="container">
                <h1>Shopping Cart</h1>

                <div id="cartItems"></div>

                <div class="cart-summary">
                    <h3>Total: <span id="cartTotal">0 VND</span></h3>
                    <a href="payment.html" class="btn btn-dark">Proceed to Payment</a>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer dùng chung -->
    <div id="footer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Common JS -->
    <script src="js/components.js"></script>
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/cart-page.js"></script>

    <!-- Page JS đặt ở dưới tùy từng trang -->
</body>

</html>
