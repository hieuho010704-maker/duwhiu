<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Men's Wear</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Custom CSS Architecture -->
    <link rel="stylesheet" href="css/main.css">
</head>

<body>

    <!-- Header dùng chung -->
    <div id="header"></div>

    <!-- Nội dung riêng của từng trang -->
    <main>
        <section class="cart-page" style="padding: 40px 0 80px 0;">
            <div class="container">
                <nav class="breadcrumb" style="margin-bottom: 20px;">
                    <a href="index.html">Home</a>
                    <span class="separator">/</span>
                    <span class="current">Shopping Bag</span>
                </nav>

                <div class="row cart-layout">
                    <!-- Left: Cart Items -->
                    <div class="col-lg-8 cart-items-col">
                        <div class="cart-header-top d-flex justify-content-between align-items-center mb-4">
                            <h1 style="font-size: 24px; font-weight: 700; margin: 0; font-family: 'Inter', sans-serif;">My Cart</h1>
                            <a href="products.html" class="continue-shopping-link" style="color: var(--color-gray-600); text-decoration: none; font-weight: 500; font-size: 14px;">Continue Shopping</a>
                        </div>
                        <div id="cartItems" class="cart-page__items" style="background: #fff; border-radius: 8px; border: 1px solid var(--color-gray-200); padding: 0;">
                            <!-- Items go here -->
                        </div>
                        
                        <!-- You may also like Section -->
                        <div class="cart-recommended-section mt-5">
                            <h3 class="mb-4" style="font-size: 18px; font-weight: 600;">You may also like</h3>
                            <div class="row" id="cartRecommendedGrid">
                                <!-- Recommended products will be rendered here -->
                            </div>
                        </div>
                    </div>

                    <!-- Right: Summary -->
                    <div class="col-lg-4 cart-summary-col">
                        <div class="cart-summary-box" id="cartSummary" style="display: none; background: #fff; border: 1px solid var(--color-gray-200); border-radius: 8px; padding: 24px; position: sticky; top: 100px;">
                            <h2 style="font-size: 18px; font-weight: 600; margin-bottom: 24px;">Order Summary</h2>
                            
                            <div class="promo-accordion mb-4 pb-4 border-bottom">
                                <button class="btn btn-link text-decoration-none p-0 d-flex align-items-center w-100" style="color: var(--color-gray-600); font-size: 14px;" type="button" data-bs-toggle="collapse" data-bs-target="#promoCodeCollapse" aria-expanded="false" aria-controls="promoCodeCollapse">
                                    <i class="fa-solid fa-tag me-2" style="color: #f59e0b;"></i> Have a promo code? <i class="fa-solid fa-chevron-down ms-auto"></i>
                                </button>
                                <div class="collapse" id="promoCodeCollapse">
                                    <div class="d-flex mt-3" style="gap: 10px;">
                                        <input type="text" id="promoCode" class="form-control form-control-sm" placeholder="Enter code">
                                        <button class="btn btn-dark btn-sm" id="applyPromoBtn">Apply</button>
                                    </div>
                                </div>
                            </div>

                            <div class="cart-summary__row d-flex justify-content-between mb-3" style="font-size: 14px; color: var(--color-gray-600);">
                                <span id="summarySubtotalLabel">Subtotal (0 items)</span>
                                <span id="cartSubtotal" style="color: var(--color-black); font-weight: 500;">0 VND</span>
                            </div>
                            <div class="cart-summary__row d-flex justify-content-between mb-3" style="font-size: 14px; color: var(--color-gray-600);">
                                <span>Shipping</span>
                                <span id="cartShipping" style="color: #34C759; font-weight: 500;">Free</span>
                            </div>
                            <div class="cart-summary__row d-flex justify-content-between mb-4" style="font-size: 14px; color: var(--color-gray-600);">
                                <span>Estimated tax</span>
                                <span id="cartTax" style="color: var(--color-black); font-weight: 500;">0 VND</span>
                            </div>
                            
                            <hr class="summary-divider mb-4">
                            
                            <div class="cart-summary__row cart-summary__row--total d-flex justify-content-between mb-4" style="font-size: 18px; font-weight: 700; color: var(--color-black);">
                                <span>Total</span>
                                <span id="cartTotal">0 VND</span>
                            </div>

                            <a href="payment.html" class="btn btn-dark w-100 mb-3 py-3" style="border-radius: 8px; font-weight: 600;">Continue to checkout</a>
                            <a href="products.html" class="btn btn-outline-dark w-100 py-3" style="border-radius: 8px; font-weight: 600; border-color: var(--color-gray-300);">Continue Shopping</a>
                            
                            <div class="secure-checkout text-center mt-4" style="color: var(--color-gray-500); font-size: 12px;">
                                <i class="fa-solid fa-lock" style="color: #10b981;"></i> Secure Checkout
                                <div class="mt-2" style="font-size: 20px;">
                                    <i class="fa-brands fa-cc-visa me-2" style="color: #1a1f71;"></i>
                                    <i class="fa-brands fa-cc-mastercard me-2" style="color: #eb001b;"></i>
                                    <i class="fa-brands fa-cc-paypal" style="color: #003087;"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer dùng chung -->
    <div id="footer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Common JS -->
    <script src="js/components.js"></script>
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/cart-page.js"></script>
</body>

</html>
